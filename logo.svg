<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">chaloSCF logo</title>
  <desc id="desc">A neon circular walking trail mark for shasf and chaloSCF.</desc>
  <defs>
    <linearGradient id="trail" x1="80" y1="80" x2="640" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff36a"/>
      <stop offset=".38" stop-color="#00f5ff"/>
      <stop offset=".66" stop-color="#ff4ecd"/>
      <stop offset="1" stop-color="#ff6b00"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.95 0 0 0 0 1 0 0 0 .8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="720" height="720" rx="132" fill="#05060b"/>
  <path d="M145 468c71 70 178 93 270 56 85-34 154-124 145-213-8-84-82-157-167-161-92-5-179 68-190 159-8 67 28 139 91 170 56 27 130 17 179-27" fill="none" stroke="url(#trail)" stroke-width="26" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M170 498l-31 84 88-27" fill="none" stroke="#fff36a" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="345" text-anchor="middle" fill="#f8fbff" font-family="Arial, Helvetica, sans-serif" font-size="148" font-weight="900">शस्फ</text>
  <text x="360" y="432" text-anchor="middle" fill="#00f5ff" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800">chaloSCF</text>
</svg>
